<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartnerGuru - AI Generator Lembar Ujian</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (Diperbarui ke Versi 7 untuk mendukung sintaks JS modern seperti '?.' Optional Chaining) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">
    
    <!-- Wadah Aplikasi React -->
    <div id="root"></div>

    <!-- Gunakan script text/babel agar JSX dan ES6+ dikompilasi oleh Babel -->
    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect, useRef } = React;

        // --- KONFIGURASI API GEMINI ---
        const apiKey = ""; // API key disediakan oleh environment pada saat runtime

        // --- ICON HELPER ---
        // Komponen pembungkus untuk memuat Lucide Icons melalui CDN
        const Icon = ({ icon, className }) => {
            const getSvg = () => {
                if (!window.lucide || !window.lucide.icons) return '';
                let lucideIcon = window.lucide.icons[icon] || window.lucide.icons[icon.toLowerCase()];
                if(!lucideIcon) {
                    if(icon === 'loader2') lucideIcon = window.lucide.icons['loader'];
                    else if(icon === 'checkCircle2') lucideIcon = window.lucide.icons['checkCircle'];
                    else lucideIcon = window.lucide.icons['helpCircle'];
                }
                return lucideIcon ? lucideIcon.toSvg({ class: className || 'w-5 h-5' }) : '';
            };

            const [svgContent, setSvgContent] = useState('');
            useEffect(() => {
                setSvgContent(getSvg());
            }, [icon, className]);

            return <span className="inline-flex items-center justify-center" dangerouslySetInnerHTML={{ __html: svgContent }} />;
        };

        // Pemetaan Ikon
        const LayoutTemplate = (p) => <Icon icon="layoutTemplate" {...p} />;
        const Sun = (p) => <Icon icon="sun" {...p} />;
        const Moon = (p) => <Icon icon="moon" {...p} />;
        const Sparkles = (p) => <Icon icon="sparkles" {...p} />;
        const AlertCircle = (p) => <Icon icon="alertCircle" {...p} />;
        const BookOpen = (p) => <Icon icon="bookOpen" {...p} />;
        const Brain = (p) => <Icon icon="brain" {...p} />;
        const Loader2 = (p) => <Icon icon="loader2" {...p} />;
        const ImageIcon = (p) => <Icon icon="image" {...p} />;
        const Printer = (p) => <Icon icon="printer" {...p} />;
        const RefreshCw = (p) => <Icon icon="refreshCw" {...p} />;
        const GraduationCap = (p) => <Icon icon="graduationCap" {...p} />;
        const Settings = (p) => <Icon icon="settings" {...p} />;
        const Download = (p) => <Icon icon="download" {...p} />;
        const Copy = (p) => <Icon icon="copy" {...p} />;
        const CheckCircle2 = (p) => <Icon icon="checkCircle2" {...p} />;

        // --- KOMPONEN UTAMA ---
        function App() {
          const [darkMode, setDarkMode] = useState(false);

          // Cek preferensi tema sistem saat pertama kali dimuat
          useEffect(() => {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
              setDarkMode(true);
            }
          }, []);

          // Terapkan class 'dark' ke elemen HTML
          useEffect(() => {
            if (darkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }, [darkMode]);

          // SETUP MATHJAX (RUMUS MATEMATIKA) & HTML-DOCX / HTML2PDF
          useEffect(() => {
            if (!window.MathJax) {
              window.MathJax = {
                tex: {
                  inlineMath: [['$', '$'], ['\\(', '\\)']],
                  displayMath: [['$$', '$$'], ['\\[', '\\]']]
                },
                startup: { typeset: false }
              };
              const scriptMath = document.createElement('script');
              scriptMath.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js';
              scriptMath.async = true;
              document.head.appendChild(scriptMath);
            }

            if (!window.htmlDocx) {
              const scriptDocx = document.createElement('script');
              scriptDocx.src = 'https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js';
              scriptDocx.async = true;
              document.head.appendChild(scriptDocx);
            }

            if (!window.html2pdf) {
              const scriptPdf = document.createElement('script');
              scriptPdf.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
              scriptPdf.async = true;
              document.head.appendChild(scriptPdf);
            }
          }, []);

          return (
            <div className={`min-h-screen font-sans transition-colors duration-300 flex flex-col ${darkMode ? 'dark bg-slate-900 text-slate-100' : 'bg-slate-50 text-slate-800'}`}>
              
              {/* Top Header (Navigasi Atas) - Disembunyikan saat mode Print */}
              <header className={`print:hidden sticky top-0 z-30 h-16 px-4 sm:px-6 flex items-center justify-between shadow-sm border-b transition-colors duration-300 ${darkMode ? 'bg-slate-800/90 backdrop-blur-md border-slate-700' : 'bg-white/90 backdrop-blur-md border-slate-200'}`}>
                <div className="flex items-center gap-2 text-orange-500 dark:text-orange-400">
                  <Sparkles className="w-6 h-6" />
                  <h1 className="text-xl font-bold">PartnerGuru</h1>
                </div>
                <div className="flex items-center gap-4">
                   <span className="text-xs font-medium text-slate-500 dark:text-slate-400 hidden sm:inline-block">AI Generator Lembar Ujian</span>
                   <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors" title="Ubah Tema">
                      {darkMode ? <Sun className="w-5 h-5 text-amber-400" /> : <Moon className="w-5 h-5 text-slate-500" />}
                    </button>
                </div>
              </header>

              {/* Main Content Area - Full Width */}
              <main className="flex-1 p-3 sm:p-4 md:p-6 lg:p-6 w-full h-[calc(100vh-4rem)] print:h-auto print:p-0 print:block">
                <GeneratorView darkMode={darkMode} />
              </main>
            </div>
          );
        }

        // --- GENERATOR VIEW (FITUR UTAMA) ---

        const initialFormState = {
          kabupaten: '', dinas: '', sekolah: '', alamat: '',
          jenisUjian: '', tahunPelajaran: '', guru: '', nip: '',
          mataPelajaran: '', jenjang: '', kelas: '', semester: '', 
          kurikulum: '', topik: '', tujuanPembelajaran: '', durasi: '',
          jumlahPG: '', jumlahPGK: '', jumlahIsian: '', jumlahEsai: '', 
          jumlahBS: '', jumlahJodoh: '', tingkatKesulitan: '', levelKognitif: '',
          opsiPG: '4', 
          sertakanGambar: true, konteks: ''
        };

        // Fungsi pengaman anti-crash JSON AI
        const safeRender = (val) => {
          if (val === null || val === undefined) return '';
          if (Array.isArray(val)) return val.join(', ');
          if (typeof val === 'object') {
            try { return JSON.stringify(val); } catch(e) { return ''; }
          }
          return String(val);
        };

        function GeneratorView({ darkMode }) {
          const [formData, setFormData] = useState(initialFormState);
          const [isGenerating, setIsGenerating] = useState(false);
          const [fetchingImages, setFetchingImages] = useState(false);
          const [result, setResult] = useState(null);
          const [error, setError] = useState('');
          const [progressMsg, setProgressMsg] = useState('');
          const [activeTab, setActiveTab] = useState('kisi'); // kisi, soal, kunci, all
          const [retryingImages, setRetryingImages] = useState({});
          const [toast, setToast] = useState({ show: false, message: '', type: '' });
          const printRef = useRef(null);

          // TRIGGER MATHJAX
          useEffect(() => {
            if (result && window.MathJax && window.MathJax.typesetPromise) {
              const timeoutId = setTimeout(() => {
                window.MathJax.typesetPromise().catch(err => console.log('MathJax Error:', err));
              }, 200);
              return () => clearTimeout(timeoutId);
            }
          }, [result, activeTab]);

          const handleChange = (e) => {
            const { name, value, type, checked } = e.target;
            setFormData({ ...formData, [name]: type === 'checkbox' ? checked : value });
          };

          // GENERATE GAMBAR
          const generateImageFast = async (promptText) => {
            const maxRetries = 2; 
            for (let i = 0; i < maxRetries; i++) {
              try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ 
                                text: "Buatkan gambar ilustrasi atau diagram pendidikan sederhana, minimalis, dan jelas tentang: " + promptText + ". PENTING: Semua teks, keterangan, atau label di dalam gambar WAJIB menggunakan ejaan Bahasa Indonesia yang benar. Latar belakang putih bersih." 
                            }]
                        }],
                        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    let base64 = null;
                    if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
                        const part = data.candidates[0].content.parts.find(p => p.inlineData);
                        if (part && part.inlineData) {
                            base64 = part.inlineData.data;
                        }
                    }
                    if (base64) return `data:image/png;base64,${base64}`;
                }
              } catch (err) {
                 console.warn(`Fast Image Retry ${i+1} failed`);
              }
              if (i < maxRetries - 1) await new Promise(res => setTimeout(res, 500)); 
            }
            return null;
          };

          const retrySingleImage = async (type, index, promptText) => {
            const key = `${type}-${index}`;
            setRetryingImages(prev => ({ ...prev, [key]: true }));
            const imageUrl = await generateImageFast(promptText);
            
            setResult(prevResult => {
              const newData = JSON.parse(JSON.stringify(prevResult)); 
              if (imageUrl) {
                newData.soal[type][index].image_url = imageUrl;
                newData.soal[type][index].image_error = false;
              } else {
                newData.soal[type][index].image_error = true;
              }
              return newData;
            });
            setRetryingImages(prev => ({ ...prev, [key]: false }));
          };

          const handleGenerate = async (e) => {
            e.preventDefault();
            if (!formData.mataPelajaran || !formData.topik) {
                setError('Mata Pelajaran dan Topik/Bab wajib diisi.');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }
            
            const totPG = Number(formData.jumlahPG) || 0;
            const totPGK = Number(formData.jumlahPGK) || 0;
            const totIsian = Number(formData.jumlahIsian) || 0;
            const totEsai = Number(formData.jumlahEsai) || 0;
            const totBS = Number(formData.jumlahBS) || 0;
            const totJodoh = Number(formData.jumlahJodoh) || 0;
            
            const totSoal = totPG + totPGK + totIsian + totEsai + totBS + totJodoh;
            
            if (totSoal === 0) {
                setError('Silakan isi jumlah minimal 1 soal pada salah satu bentuk soal.');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            setError(''); 
            setIsGenerating(true); 
            setResult(null); 
            setRetryingImages({});
            setProgressMsg('Menghubungkan ke Gemini AI...');

            const opsiLetters = formData.opsiPG === "3" ? "A, B, C" : formData.opsiPG === "5" ? "A, B, C, D, E" : "A, B, C, D";
            const opsiArrayStr = formData.opsiPG === "3" ? '["A. ...", "B. ...", "C. ..."]' : formData.opsiPG === "5" ? '["A. ...", "B. ...", "C. ...", "D. ...", "E. ..."]' : '["A. ...", "B. ...", "C. ...", "D. ..."]';

            const promptText = `
Anda adalah pembuat soal ujian profesional di Indonesia. Buatlah paket soal dengan rincian berikut:

DATA:
- Mapel: ${formData.mataPelajaran || 'Umum'}
- Jenjang & Kelas: ${formData.jenjang || '-'} / ${formData.kelas || '-'}
- Jenis Evaluasi: ${formData.jenisUjian || 'Ujian/Latihan'} Semester ${formData.semester || '-'}
- Materi/Topik: ${formData.topik}
- Tujuan Pembelajaran: ${formData.tujuanPembelajaran || 'Peserta didik memahami materi tersebut'}
- Tingkat Kesulitan Soal: ${formData.tingkatKesulitan || 'Campuran (Mudah, Sedang, Sulit)'}
- Komposisi Kognitif: ${formData.levelKognitif || 'Campuran (HOTS, MOTS, LOTS)'}
- Visual: ${formData.sertakanGambar ? 'Sertakan deskripsi BHS INDONESIA SINGKAT (maks 10 kata) untuk field gambar_dibutuhkan HANYA PADA SOAL YANG SANGAT MEMBUTUHKAN ILUSTRASI (Maksimal 3 soal keseluruhan untuk mempercepat render). Contoh: "Diagram rantai makanan di sawah". Jika tidak perlu gambar, isi "null"' : 'Isi gambar_dibutuhkan dengan "null"'}
- Penulisan Rumus (Equation): WAJIB gunakan format LaTeX untuk rumus Matematika/Sains/Fisika/Kimia. Gunakan pembungkus $...$ untuk rumus di dalam teks (inline) dan $$...$$ untuk rumus blok. PASTIKAN untuk meng-escape karakter backslash pada JSON dengan double backslash (contoh yang benar: "Nilai dari $\\\\frac{1}{2}$").

STRUKTUR SOAL DIMINTA:
- Pilihan Ganda (PG) Biasa: ${totPG} soal (Hanya 1 jawaban benar, sediakan ${formData.opsiPG} Opsi: ${opsiLetters})
- Pilihan Ganda Kompleks (PGK): ${totPGK} soal (Sediakan ${formData.opsiPG} Opsi: ${opsiLetters}, dan pastikan ada 2-3 jawaban yang benar)
- Isian Singkat: ${totIsian} soal
- Uraian / Esai: ${totEsai} soal
- Benar / Salah (BS): ${totBS} soal
- Menjodohkan: ${totJodoh > 0 ? `Ya, buat 1 blok soal menjodohkan yang berisi tepat ${totJodoh} premis (pertanyaan) dan pilihan jawaban` : '0 soal'}

OUTPUT WAJIB DALAM FORMAT JSON BERIKUT (Tanpa markdown):
{
  "kisi_kisi": [
    { "no": "1", "materi_pokok": "...", "indikator": "...", "level": "C1/C2/etc", "stimulus_visual": "...", "no_soal": "..." }
  ],
  "soal": {
    "pg": [ 
      { "no": "1", "pertanyaan": "...", "gambar_dibutuhkan": "...", "opsi": ${opsiArrayStr} } 
    ],
    "pgk": [ 
      { "no": "6", "pertanyaan": "...", "gambar_dibutuhkan": "...", "opsi": ${opsiArrayStr} } 
    ],
    "isian": [ 
      { "no": "21", "pertanyaan": "...", "gambar_dibutuhkan": "..." } 
    ],
    "esai": [ 
      { "no": "26", "pertanyaan": "...", "gambar_dibutuhkan": "..." } 
    ],
    "bs": [
      { "no": "31", "pertanyaan": "...", "gambar_dibutuhkan": "..." }
    ],
    "jodoh": {
      "ada": ${totJodoh > 0},
      "petunjuk": "Jodohkanlah pernyataan di Kolom A dengan pilihan di Kolom B yang paling tepat!",
      "premis": [ { "no": "36", "teks": "..." } ],
      "pilihan": [ "A. ...", "B. ...", "C. ..." ]
    }
  },
  "kunci": {
    "pg": [ { "no": "1", "jawaban": "A", "level": "C1" } ],
    "pgk": [ { "no": "6", "jawaban": ["A", "C", "D"], "level": "C3" } ],
    "isian": [ { "no": "21", "jawaban": "...", "skor_maks": "4" } ],
    "bs": [ { "no": "31", "jawaban": "Benar" } ],
    "jodoh": [ { "no": "36", "jawaban_huruf": "B", "jawaban_teks": "..." } ]
  },
  "rubrik_esai": [
    { "kriteria": "...", "skor_4": "Penjelasan Sangat Baik...", "skor_3": "Penjelasan Baik...", "skor_2": "Cukup...", "skor_1": "Kurang...", "skor_maks": "4" }
  ]
}

PENTING:
- Pastikan array "pg" berjumlah persis ${totPG}, "pgk" berjumlah ${totPGK}, "isian" berjumlah ${totIsian}, "esai" berjumlah ${totEsai}, dan "bs" berjumlah ${totBS}. 
- Untuk "jodoh.premis", pastikan jumlahnya persis ${totJodoh}.
- Jika jumlah jenis soal adalah 0, berikan array kosong []. Lanjutkan penomoran soal (no) dengan runtut.
- Pada "kisi_kisi", pastikan memuat SEMUA soal dari semua jenis yang digenerate.
`;

            try {
              setProgressMsg('Menyusun kisi-kisi, soal, dan pedoman penskoran...');
              
              const fetchTextWithRetry = async () => {
                  const delays = [1000, 2000, 4000];
                  for(let i = 0; i < delays.length; i++) {
                      try {
                          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                              method: 'POST', headers: { 'Content-Type': 'application/json' },
                              body: JSON.stringify({
                                contents: [{ parts: [{ text: promptText }] }],
                                generationConfig: { temperature: 0.7, responseMimeType: "application/json" }
                              })
                          });
                          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                          return await response.json();
                      } catch (e) {
                          if (i === delays.length - 1) throw e;
                          await new Promise(res => setTimeout(res, delays[i]));
                      }
                  }
              };

              const data = await fetchTextWithRetry();
              
              let cleanJsonString = data.candidates[0].content.parts[0].text.trim();
              if (cleanJsonString.startsWith('```json')) cleanJsonString = cleanJsonString.substring(7);
              if (cleanJsonString.endsWith('```')) cleanJsonString = cleanJsonString.substring(0, cleanJsonString.length - 3);

              const parsedData = JSON.parse(cleanJsonString);
              let finalData = { ...parsedData };

              finalData.meta_count = { pg: totPG, pgk: totPGK, isian: totIsian, esai: totEsai, bs: totBS, jodoh: totJodoh };

              setResult(finalData); 
              setActiveTab('soal');
              setIsGenerating(false);

              // Mulai Render Gambar
              if (formData.sertakanGambar) {
                setFetchingImages(true);
                let imageTasks = [];
                const types = ['pg', 'pgk', 'isian', 'esai', 'bs'];
                
                types.forEach(type => {
                    if(finalData.soal && finalData.soal[type] && finalData.soal[type].length > 0) {
                        finalData.soal[type].forEach(async (item, index) => {
                            if (item.gambar_dibutuhkan && safeRender(item.gambar_dibutuhkan) !== "null" && safeRender(item.gambar_dibutuhkan).trim() !== "") {
                                const task = async () => {
                                    const imageUrl = await generateImageFast(item.gambar_dibutuhkan);
                                    setResult(prev => {
                                        if(!prev) return prev;
                                        let newData = JSON.parse(JSON.stringify(prev));
                                        if (imageUrl) {
                                            newData.soal[type][index].image_url = imageUrl;
                                            newData.soal[type][index].image_error = false;
                                        } else {
                                            newData.soal[type][index].image_error = true;
                                        }
                                        return newData;
                                    });
                                };
                                imageTasks.push(task());
                            }
                        });
                    }
                });

                Promise.allSettled(imageTasks).then(() => {
                   setFetchingImages(false);
                });
              }

              if (window.innerWidth < 1024) {
                  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
              }
              
            } catch (err) {
              console.error("API Error:", err);
              setError('Terjadi kesalahan format dari AI. Mohon kurangi sedikit jumlah soal atau coba generate ulang.');
              window.scrollTo({ top: 0, behavior: 'smooth' });
              setIsGenerating(false);
            }
          };

          // =========================================================================
          // FUNGSI 1: DOWNLOAD PDF LANGSUNG (Direct File Download)
          // =========================================================================
          const handleDownloadPDF = () => {
            if (!printRef.current) return;
            if (!window.html2pdf) {
              setToast({ show: true, message: 'Pustaka PDF belum dimuat. Harap tunggu sebentar.', type: 'error' });
              return;
            }

            setToast({ show: true, message: 'Menyusun PDF secara langsung, mohon tunggu...', type: 'loading' });
            
            const prevTab = activeTab;
            setActiveTab('all');

            setTimeout(() => {
                const element = printRef.current;
                
                // Sembunyikan elemen UI khusus saat memfoto untuk PDF
                const noPrintElements = element.querySelectorAll('.print\\:hidden');
                noPrintElements.forEach(el => el.style.display = 'none');

                const opt = {
                  margin:       [15, 10, 15, 10], // Margin: Atas, Kanan, Bawah, Kiri
                  filename:     `Naskah_Soal_${(safeRender(formData.mataPelajaran) || 'Mapel').replace(/\s+/g, '_')}.pdf`,
                  image:        { type: 'jpeg', quality: 0.98 },
                  html2canvas:  { scale: 2, useCORS: true },
                  jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                  pagebreak:    { mode: ['css', 'legacy'], avoid: ['.break-inside-avoid', 'tr', 'img'] }
                };

                window.html2pdf().set(opt).from(element).save().then(() => {
                    noPrintElements.forEach(el => el.style.display = ''); // Kembalikan UI
                    setActiveTab(prevTab);
                    setToast({ show: true, message: 'PDF Berhasil Diunduh!', type: 'success' });
                    setTimeout(() => setToast({ show: false, message: '', type: '' }), 4000);
                }).catch(err => {
                    console.error(err);
                    noPrintElements.forEach(el => el.style.display = '');
                    setActiveTab(prevTab);
                    setToast({ show: true, message: 'Terjadi kesalahan saat mengunduh PDF.', type: 'error' });
                    setTimeout(() => setToast({ show: false, message: '', type: '' }), 4000);
                });
            }, 1500); 
          };

          // =========================================================================
          // FUNGSI 2: EXPORT KE WORD (.DOCX) - MENGGUNAKAN LIBRARY HTML-DOCX-JS
          // =========================================================================
          const exportToWord = () => {
            if (!printRef.current) return;

            if (!window.htmlDocx) {
                setToast({ show: true, message: 'Menunggu library pembuat Word dimuat. Coba klik lagi.', type: 'error' });
                return;
            }

            setToast({ show: true, message: 'Mengekstrak gambar dan membuat file Word (.docx)...', type: 'loading' });
            
            const prevTab = activeTab;
            setActiveTab('all'); 

            setTimeout(() => {
              try {
                const clone = printRef.current.cloneNode(true);
                
                // Buang tombol/elemen antarmuka UI
                const noPrintElements = clone.querySelectorAll('.print\\:hidden');
                noPrintElements.forEach(el => el.remove());

                // PERSIAPAN GAMBAR UNTUK HTML-DOCX: 
                const images = clone.querySelectorAll('img');
                images.forEach(img => {
                    img.setAttribute('width', '400'); 
                    img.style.maxWidth = '100%'; 
                    img.style.display = 'block';

                              <p style={{ fontStyle: 'italic', marginBottom: '16px' }}>Petunjuk: Jawablah soal berikut dengan lengkap, rinci, dan sistematis!</p>
                              
                              <div className="space-y-6">
                                {result.soal.esai.map((item, i) => (
                                  <table key={`esai-${i}`} className="break-inside-avoid" style={{ width: '100%', border: 'none', pageBreakInside: 'avoid', breakInside: 'avoid', marginBottom: '24px' }}>
                                    <tbody>
                                      <tr>
                                        <td style={{ width: '25px', verticalAlign: 'top', border: 'none', fontWeight: 'bold' }}>{safeRender(item.no)}.</td>
                                        <td style={{ verticalAlign: 'top', border: 'none' }}>
                                          {safeRender(item.gambar_dibutuhkan) && safeRender(item.gambar_dibutuhkan) !== "null" && (
                                            <div style={{ textAlign: 'center', margin: '15px 0' }}>
                                              {item.image_url ? (
                                                <img src={item.image_url} alt="Ilustrasi" style={{ maxWidth: '100%', width: '350px', height: 'auto', display: 'block', margin: '10px auto' }} width="350" />
                                              ) : item.image_error ? (
                                                <div className="print:hidden">
                                                  <span>[ Gambar Visual Gagal Dimuat ]</span>
                                                  <button onClick={() => retrySingleImage('esai', i, item.gambar_dibutuhkan)} className="mt-2 px-2 py-1 bg-orange-100 text-orange-700 rounded text-[10px] mx-auto flex items-center gap-1"><RefreshCw className="w-3 h-3"/> Ulangi</button>
                                                </div>
                                              ) : (
                                                <span className="print:hidden">Merender Ilustrasi...</span>
                                              )}
                                            </div>
                                          )}
                                          <p style={{ margin: '0 0 16px 0', whiteSpace: 'pre-wrap' }}>{safeRender(item.pertanyaan)}</p>
                                          {/* Space for answer */}
                                          <div style={{ width: '100%' }}>
                                            <div style={{ borderBottom: '1px solid gray', width: '100%', height: '24px' }}></div>
                                            <div style={{ borderBottom: '1px solid gray', width: '100%', height: '24px' }}></div>
                                            <div style={{ borderBottom: '1px solid gray', width: '100%', height: '24px' }}></div>
                                            <div style={{ borderBottom: '1px solid gray', width: '100%', height: '24px' }}></div>
                                          </div>
                                        </td>
                                      </tr>
                                    </tbody>
                                  </table>
                                ))}
                              </div>
                            </div>
                          )}

                          {/* PEMISAH HALAMAN UNTUK PDF DAN WORD */}
                          <div className="page-break print:page-break-after-always" style={{ pageBreakAfter: 'always', clear: 'both' }}></div>
                        </div>

                        {/* ----------------- TAB 3: KUNCI JAWABAN & RUBRIK ----------------- */}
                        <div className={activeTab === 'kunci' || activeTab === 'all' ? 'block' : 'hidden print:block'}>
                          
                          <h2 style={{ fontWeight: 'bold', fontSize: '12pt', textAlign: 'center', textTransform: 'uppercase', marginBottom: '16px' }}>F. KUNCI JAWABAN DAN PEDOMAN PENSKORAN</h2>

                          {/* Kunci PG */}
                          {result.meta_count?.pg > 0 && result.kunci?.pg && (
                            <div style={{ marginBottom: '24px' }}>
                              <h3 style={{ fontWeight: 'bold', fontSize: '12pt', marginBottom: '8px' }}>Kunci Jawaban Pilihan Ganda</h3>
                              <div className="overflow-x-auto pb-4">
                                <table style={{ width: '100%', maxWidth: '500px', borderCollapse: 'collapse', border: '1px solid black' }}>
                                  <thead style={{ backgroundColor: '#f3f4f6' }}>
                                    <tr>
                                      <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', width: '40px', fontWeight: 'bold' }}>No.</th>
                                      <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', width: '100px', fontWeight: 'bold' }}>Jawaban</th>
                                      <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', width: '100px', fontWeight: 'bold' }}>Level</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {result.kunci.pg.map((k, i) => (
                                      <tr key={i}>
                                        <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>{safeRender(k.no)}</td>
                                        <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>{safeRender(k.jawaban)}</td>
                                        <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>{safeRender(k.level)}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          )}

                          {/* Kunci PG Kompleks */}
                          {result.meta_count?.pg > 0 && result.kunci?.pgk && (
                            <div style={{ marginBottom: '24px' }}>
                              <h3 style={{ fontWeight: 'bold', fontSize: '12pt', marginBottom: '8px' }}>Kunci Jawaban Pilihan Ganda Kompleks</h3>
                              <div className="overflow-x-auto pb-4">
                                <table style={{ width: '100%', maxWidth: '500px', borderCollapse: 'collapse', border: '1px solid black' }}>
                                  <thead style={{ backgroundColor: '#f3f4f6' }}>
                                    <tr>
                                      <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', width: '40px', fontWeight: 'bold' }}>No.</th>
                                      <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', width: '200px', fontWeight: 'bold' }}>Jawaban Benar</th>
                                      <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', width: '100px', fontWeight: 'bold' }}>Level</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {result.kunci.pgk.map((k, i) => (
                                      <tr key={i}>
                                        <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>{safeRender(k.no)}</td>
                                        <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>
                                          {Array.isArray(k.jawaban) ? k.jawaban.join(', ') : safeRender(k.jawaban)}
                                        </td>
                                        <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>{safeRender(k.level)}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                              <p style={{ fontSize: '10pt', fontStyle: 'italic', marginTop: '4px' }}>Catatan PGK: Nilai penuh diberikan jika seluruh jawaban benar terpilih.</p>
                            </div>
                          )}
                          
                          {/* Kunci BS */}
                          {result.meta_count?.bs > 0 && result.kunci?.bs && (
                            <div style={{ marginBottom: '24px' }}>
                              <h3 style={{ fontWeight: 'bold', fontSize: '12pt', marginBottom: '8px' }}>Kunci Jawaban Benar / Salah</h3>
                              <div className="overflow-x-auto pb-4">
                                <table style={{ width: '100%', maxWidth: '400px', borderCollapse: 'collapse', border: '1px solid black' }}>
                                  <thead style={{ backgroundColor: '#f3f4f6' }}>
                                    <tr>
                                      <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', width: '40px', fontWeight: 'bold' }}>No.</th>
                                      <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', width: '150px', fontWeight: 'bold' }}>Kunci Jawaban</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {result.kunci.bs.map((k, i) => (
                                      <tr key={i}>
                                        <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>{safeRender(k.no)}</td>
                                        <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>{safeRender(k.jawaban)}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          )}

                          {/* Kunci Menjodohkan */}
                          {result.meta_count?.jodoh > 0 && result.kunci?.jodoh && (
                            <div style={{ marginBottom: '24px' }}>
                              <h3 style={{ fontWeight: 'bold', fontSize: '12pt', marginBottom: '8px' }}>Kunci Jawaban Menjodohkan</h3>
                              <div className="overflow-x-auto pb-4">
                                <table style={{ width: '100%', borderCollapse: 'collapse', border: '1px solid black' }}>
                                  <thead style={{ backgroundColor: '#f3f4f6' }}>
                                    <tr>
                                      <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', width: '80px', fontWeight: 'bold' }}>No. Premis</th>
                                      <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', width: '100px', fontWeight: 'bold' }}>Pilihan (Huruf)</th>
                                      <th style={{ border: '1px solid black', padding: '6px', fontWeight: 'bold' }}>Jawaban Teks Lengkap</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {result.kunci.jodoh.map((k, i) => (
                                      <tr key={i}>
                                        <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>{safeRender(k.no)}</td>
                                        <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>{safeRender(k.jawaban_huruf)}</td>
                                        <td style={{ border: '1px solid black', padding: '6px' }}>{safeRender(k.jawaban_teks)}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          )}

                          {/* Kunci Isian */}
                          {result.meta_count?.isian > 0 && result.kunci?.isian && (
                            <div style={{ marginBottom: '24px' }}>
                              <h3 style={{ fontWeight: 'bold', fontSize: '12pt', marginBottom: '8px' }}>Kunci Jawaban Isian Singkat</h3>
                              <div className="overflow-x-auto pb-4">
                                <table style={{ width: '100%', borderCollapse: 'collapse', border: '1px solid black' }}>
                                  <thead style={{ backgroundColor: '#f3f4f6' }}>
                                    <tr>
                                      <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', width: '40px', fontWeight: 'bold' }}>No.</th>
                                      <th style={{ border: '1px solid black', padding: '6px', fontWeight: 'bold' }}>Kunci Jawaban</th>
                                      <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', width: '100px', fontWeight: 'bold' }}>Skor Maks.</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {result.kunci.isian.map((k, i) => (
                                      <tr key={i}>
                                        <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>{safeRender(k.no)}</td>
                                        <td style={{ border: '1px solid black', padding: '6px' }}>{safeRender(k.jawaban)}</td>
                                        <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>{safeRender(k.skor_maks) || 4}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          )}

                          {/* Rubrik Esai */}
                          {result.meta_count?.esai > 0 && result.rubrik_esai && (
                            <div style={{ marginBottom: '32px', pageBreakBefore: 'auto' }}>
                              <h3 style={{ fontWeight: 'bold', fontSize: '12pt', marginBottom: '8px' }}>Rubrik Penilaian Analitis Soal Esai</h3>
                              <div className="overflow-x-auto pb-4">
                                <table style={{ width: '100%', borderCollapse: 'collapse', border: '1px solid black', fontSize: '10pt' }}>
                                  <thead style={{ backgroundColor: '#f3f4f6' }}>
                                    <tr>
                                      <th style={{ border: '1px solid black', padding: '8px', textAlign: 'center', fontWeight: 'bold' }}>Kriteria Penilaian</th>
                                      <th style={{ border: '1px solid black', padding: '8px', textAlign: 'center', fontWeight: 'bold' }}>Skor 4 (Sangat Baik)</th>
                                      <th style={{ border: '1px solid black', padding: '8px', textAlign: 'center', fontWeight: 'bold' }}>Skor 3 (Baik)</th>
                                      <th style={{ border: '1px solid black', padding: '8px', textAlign: 'center', fontWeight: 'bold' }}>Skor 2 (Cukup)</th>
                                      <th style={{ border: '1px solid black', padding: '8px', textAlign: 'center', fontWeight: 'bold' }}>Skor 1 (Kurang)</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {result.rubrik_esai.map((r, i) => (
                                      <tr key={i} style={{ verticalAlign: 'top' }}>
                                        <td style={{ border: '1px solid black', padding: '8px', fontWeight: 'bold' }}>{safeRender(r.kriteria)}</td>
                                        <td style={{ border: '1px solid black', padding: '8px' }}>{safeRender(r.skor_4)}</td>
                                        <td style={{ border: '1px solid black', padding: '8px' }}>{safeRender(r.skor_3)}</td>
                                        <td style={{ border: '1px solid black', padding: '8px' }}>{safeRender(r.skor_2)}</td>
                                        <td style={{ border: '1px solid black', padding: '8px' }}>{safeRender(r.skor_1)}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          )}

                          <h2 style={{ fontWeight: 'bold', fontSize: '12pt', marginBottom: '16px' }}>G. STRUKTUR PENILAIAN DAN BOBOT</h2>
                          <div className="flex flex-col lg:flex-row gap-6 lg:gap-8 items-start mb-12">
                            <div className="overflow-x-auto w-full lg:w-3/5">
                              <table style={{ width: '100%', borderCollapse: 'collapse', border: '1px solid black', fontSize: '11pt' }}>
                                <thead style={{ backgroundColor: '#f3f4f6' }}>
                                  <tr>
                                    <th style={{ border: '1px solid black', padding: '6px', fontWeight: 'bold' }}>Bagian Soal</th>
                                    <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>Jumlah</th>
                                    <th style={{ border: '1px solid black', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>Poin/Soal</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {result.meta_count?.pg > 0 && (
                                    <tr>
                                      <td style={{ border: '1px solid black', padding: '6px' }}>Pilihan Ganda Biasa</td>
                                      <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>{result.meta_count.pg}</td>
                                      <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>2 Poin</td>
                                    </tr>
                                  )}
                                  {result.meta_count?.pgk > 0 && (
                                    <tr>
                                      <td style={{ border: '1px solid black', padding: '6px' }}>Pilihan Ganda Kompleks</td>
                                      <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>{result.meta_count.pgk}</td>
                                      <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>4 Poin</td>
                                    </tr>
                                  )}
                                  {result.meta_count?.bs > 0 && (
                                    <tr>
                                      <td style={{ border: '1px solid black', padding: '6px' }}>Benar / Salah</td>
                                      <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>{result.meta_count.bs}</td>
                                      <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>2 Poin</td>
                                    </tr>
                                  )}
                                  {result.meta_count?.jodoh > 0 && (
                                    <tr>
                                      <td style={{ border: '1px solid black', padding: '6px' }}>Menjodohkan</td>
                                      <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>{result.meta_count.jodoh}</td>
                                      <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>2 Poin</td>
                                    </tr>
                                  )}
                                  {result.meta_count?.isian > 0 && (
                                    <tr>
                                      <td style={{ border: '1px solid black', padding: '6px' }}>Isian Singkat</td>
                                      <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>{result.meta_count.isian}</td>
                                      <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>4 Poin</td>
                                    </tr>
                                  )}
                                  {result.meta_count?.esai > 0 && (
                                    <tr>
                                      <td style={{ border: '1px solid black', padding: '6px' }}>Esai / Uraian</td>
                                      <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>{result.meta_count.esai}</td>
                                      <td style={{ border: '1px solid black', padding: '6px', textAlign: 'center' }}>8 Poin</td>
                                    </tr>
                                  )}
                                </tbody>
                              </table>
                            </div>
                            
                            <div className="lg:w-2/5 w-full p-3 sm:p-4 border border-black text-xs sm:text-sm">
                              <p style={{ fontWeight: 'bold', marginBottom: '4px' }}>Rumus Nilai Akhir:</p>
                              <p style={{ fontFamily: 'monospace', backgroundColor: '#f3f4f6', padding: '8px', border: '1px solid #d1d5db', marginBottom: '12px' }}>Nilai = (Skor Perolehan / Total Maks) × 100</p>
                              <p style={{ fontSize: '10pt', fontStyle: 'italic', color: '#4b5563' }}>Total Maks adalah akumulasi (Jumlah Soal × Poin/Soal) dari setiap bagian yang digunakan.</p>
                            </div>
                          </div>

                          {/* Tanda Tangan Menggunakan Tabel agar kebal di Export Word */}
                          <table style={{ width: '100%', border: 'none', marginTop: '48px', marginBottom: '32px' }}>
                            <tbody>
                              <tr>
                                <td style={{ width: '60%', border: 'none' }}></td>
                                <td style={{ width: '40%', border: 'none', textAlign: 'center' }}>
                                  <p style={{ margin: '0 0 8px 0' }}>{(safeRender(formData.kabupaten) || 'KAB/KOTA').replace('KABUPATEN ', '')}, ....................... {(safeRender(formData.tahunPelajaran) || new Date().getFullYear().toString()).split('/')[1] || new Date().getFullYear()}</p>
                                  <p style={{ margin: '0 0 80px 0' }}>Guru Mata Pelajaran,</p>
                                  <p style={{ margin: '0', fontWeight: 'bold', textDecoration: 'underline' }}>{safeRender(formData.guru) || '.....................................'}</p>
                                  <p style={{ margin: '0' }}>NIP. {safeRender(formData.nip) || '..............................'}</p>
                                </td>
                              </tr>
                            </tbody>
                          </table>

                        </div>

                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>
          );
        }

        // --- RENDER APLIKASI ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
